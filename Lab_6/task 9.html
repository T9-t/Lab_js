    <!-- Задание b, c -->
    <header></header>
    <main class="content">
        <aside></aside>
        <section>
            <div class="header-d">
                Выберите лицо, которое нравится вам больше остальных:
            </div>
            <div class="display"></div>
        </section>
    </main>
    
    <script>
        let divDisplay = document.querySelector(".display");

        let intervalID = window.setInterval(createCard, 2000);
        let cardCount = 0;

        function createCard() {
            cardCount++;

            let divCard = document.createElement("div");
            divCard.classList.add("card");


            let img = document.createElement("img");
            img.src = "https://thispersondoesnotexist.com" + "/?" + cardCount;
            img.alt = "Avatar";

            let divDescription = document.createElement("div");
            divDescription.classList.add("description");

            let p = document.createElement("p");
            p.textContent = randomName();

            divDescription.appendChild(p);
        
            divCard.appendChild(img);
            divCard.appendChild(divDescription);

            divDisplay.appendChild(divCard);

            if (cardCount == 6) {
                stopCreateCard();
            }
        }

        function stopCreateCard() {
            clearInterval(intervalID);
        }

        function randomName() {

            let names = ["Алексей", "Дмитрий", "Иван", "Мария", "Ольга", "Елена"];
            let surnames = ["Иванов", "Петров", "Сидоров", "Смирнова", "Кузнецова"];

            let randomName = names[Math.floor(Math.random() * names.length)];
            let randomSurname = surnames[Math.floor(Math.random() * surnames.length)];

            return randomName + " " + randomSurname;
        }  
    </script>
